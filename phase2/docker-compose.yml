version: '3.8'

networks:
  phase2:
    driver: bridge
  lgtm_default:
    external: true

services:

  # --- Kafka + ZooKeeper ---

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    networks: [phase2]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    networks: [phase2, lgtm_default]
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
      - "7071:7071"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_JMX_PORT: 9999
      KAFKA_JMX_HOSTNAME: kafka
      EXTRA_ARGS: -javaagent:/opt/jmx-exporter/jmx_prometheus_javaagent.jar=7071:/opt/jmx-exporter/config.yml
    volumes:
      - ./kafka/jmx-exporter-config.yml:/opt/jmx-exporter/config.yml
      - ./kafka/jmx_prometheus_javaagent-0.20.0.jar:/opt/jmx-exporter/jmx_prometheus_javaagent.jar

  # --- Airflow + StatsD Exporter ---

  statsd-exporter:
    image: prom/statsd-exporter:v0.26.0
    container_name: statsd-exporter
    networks: [phase2, lgtm_default]
    ports:
      - "9125:9125/udp"
      - "9102:9102"
    command:
      - --statsd.mapping-config=/etc/statsd/mapping.yml
    volumes:
      - ./airflow/statsd-mapping.yml:/etc/statsd/mapping.yml

  airflow:
    image: apache/airflow:2.8.0
    container_name: airflow
    networks: [phase2]
    depends_on: [statsd-exporter]
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__METRICS__STATSD_ON: "True"
      AIRFLOW__METRICS__STATSD_HOST: statsd-exporter
      AIRFLOW__METRICS__STATSD_PORT: "9125"
      AIRFLOW__METRICS__STATSD_PREFIX: airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    command: standalone

  # --- Zabbix ---

  zabbix-db:
    image: postgres:15
    container_name: zabbix-db
    networks: [phase2]
    environment:
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: zabbix
      POSTGRES_DB: zabbix

  zabbix-server:
    image: zabbix/zabbix-server-pgsql:alpine-6.4-latest
    container_name: zabbix-server
    networks: [phase2, lgtm_default]
    depends_on: [zabbix-db]
    ports:
      - "10051:10051"
    environment:
      DB_SERVER_HOST: zabbix-db
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: zabbix
      POSTGRES_DB: zabbix

  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:alpine-6.4-latest
    container_name: zabbix-web
    networks: [phase2]
    depends_on: [zabbix-server]
    ports:
      - "8090:8080"
    environment:
      ZBX_SERVER_HOST: zabbix-server
      DB_SERVER_HOST: zabbix-db
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: zabbix
      POSTGRES_DB: zabbix
      PHP_TZ: America/Chicago

  zabbix-agent:
    image: zabbix/zabbix-agent2:alpine-6.4-latest
    container_name: zabbix-agent
    networks: [phase2]
    environment:
      ZBX_SERVER_HOST: zabbix-server
      ZBX_HOSTNAME: lab-host

  zabbix-exporter:
    image: quay.io/prometheuscommunity/zabbix-exporter:latest
    container_name: zabbix-exporter
    networks: [phase2, lgtm_default]
    ports:
      - "9224:9224"
    environment:
      ZABBIX_URL: http://zabbix-web:8080
      ZABBIX_USER: Admin
      ZABBIX_PASSWORD: zabbix
