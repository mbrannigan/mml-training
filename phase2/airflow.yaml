---
apiVersion: v1
kind: Service
metadata:
  name: airflow
  namespace: lgtm
spec:
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30808
      protocol: TCP
      name: web
  selector:
    app: airflow
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow
  namespace: lgtm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow
  template:
    metadata:
      labels:
        app: airflow
    spec:
      containers:
        - name: airflow
          image: apache/airflow:2.8.0
          command: ["standalone"]
          ports:
            - containerPort: 8080
              name: web
          env:
            - name: AIRFLOW__METRICS__STATSD_ON
              value: "True"
            - name: AIRFLOW__METRICS__STATSD_HOST
              value: "statsd-exporter"
            - name: AIRFLOW__METRICS__STATSD_PORT
              value: "9125"
            - name: AIRFLOW__METRICS__STATSD_PREFIX
              value: "airflow"
            - name: AIRFLOW__CORE__EXECUTOR
              value: "LocalExecutor"
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              value: "sqlite:////opt/airflow/airflow.db"
            - name: _AIRFLOW_DB_MIGRATE
              value: "true"
            - name: _AIRFLOW_WWW_USER_CREATE
              value: "true"
            - name: _AIRFLOW_WWW_USER_USERNAME
              value: "admin"
            - name: _AIRFLOW_WWW_USER_PASSWORD
              value: "admin"
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          volumeMounts:
            - name: airflow-db
              mountPath: /opt/airflow
      volumes:
        - name: airflow-db
          emptyDir: {}
