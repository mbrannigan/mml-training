---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: lgtm
spec:
  type: ClusterIP
  ports:
    - port: 9092
      targetPort: 9092
      protocol: TCP
      name: broker
    - port: 7071
      targetPort: 7071
      protocol: TCP
      name: jmx-metrics
  selector:
    app: kafka
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: lgtm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "7071"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: kafka
          # Bitnami Kafka bundles JMX exporter - no init container needed
          image: bitnami/kafka:3.6
          ports:
            - containerPort: 9092
              name: broker
            - containerPort: 7071
              name: jmx-metrics
          env:
            - name: KAFKA_CFG_NODE_ID
              value: "1"
            - name: KAFKA_CFG_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_CFG_CONTROLLER_QUORUM_VOTERS
              value: "1@kafka:9093"
            - name: KAFKA_CFG_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093"
            - name: KAFKA_CFG_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka:9092"
            - name: KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
            - name: KAFKA_CFG_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            # Enable JMX exporter on port 7071
            - name: JMX_PORT
              value: "9999"
            - name: KAFKA_JMX_OPTS
              value: "-javaagent:/opt/bitnami/kafka/libs/jmx_prometheus_javaagent.jar=7071:/opt/bitnami/kafka/conf/jmx-exporter.yml"
          volumeMounts:
            - name: jmx-config
              mountPath: /opt/bitnami/kafka/conf/jmx-exporter.yml
              subPath: config.yml
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: jmx-config
          configMap:
            name: kafka-jmx-config
