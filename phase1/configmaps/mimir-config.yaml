apiVersion: v1
kind: ConfigMap
metadata:
  name: mimir-config
  namespace: lgtm
data:
  mimir.yaml: |
    target: all

    server:
      http_listen_port: 9009
      grpc_listen_port: 9095

    common:
      storage:
        backend: filesystem
        filesystem:
          dir: /data/mimir

    blocks_storage:
      backend: filesystem
      filesystem:
        dir: /data/mimir-blocks

    compactor:
      data_dir: /data/mimir-compactor

    ingester:
      ring:
        replication_factor: 1
        kvstore:
          store: inmemory

    distributor:
      ring:
        kvstore:
          store: inmemory

    ruler_storage:
      backend: filesystem
      filesystem:
        dir: /data/mimir-ruler
